  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Hanuman ownership markers
        run: |
          echo HANUMAN_RUN_ID=${{ inputs.hanuman_run_id || '' }}
          echo HANUMAN_EXECUTION_ID=${{ inputs.hanuman_execution_id || '' }}
          echo HANUMAN_GRAPH_ID=${{ inputs.hanuman_graph_id || '' }}
          echo HANUMAN_ACTION_ID=${{ inputs.hanuman_action_id || '' }}
          echo HANUMAN_IDEMPOTENCY_KEY_HASH=${{ inputs.hanuman_idempotency_key_hash || '' }}
      - name: Maven build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          HANUMAN_RUN_ID: ${{ inputs.hanuman_run_id || '' }}
          HANUMAN_EXECUTION_ID: ${{ inputs.hanuman_execution_id || '' }}
          HANUMAN_GRAPH_ID: ${{ inputs.hanuman_graph_id || '' }}
          HANUMAN_ACTION_ID: ${{ inputs.hanuman_action_id || '' }}
          HANUMAN_IDEMPOTENCY_KEY_HASH: ${{ inputs.hanuman_idempotency_key_hash || '' }}
        run: >
          mvn -B -DskipTests -Drat.skip=true verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=hanuman-apps_hanuman-apps_commons-lang
          -Dsonar.organization=hanuman-apps
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.branch.name=sonar/auto-fix-confidence-gated
          -Dsonar.analysis.hanuman.runId=${{ inputs.hanuman_run_id || '' }}
          -Dsonar.analysis.hanuman.executionId=${{ inputs.hanuman_execution_id || '' }}
          -Dsonar.analysis.hanuman.graphId=${{ inputs.hanuman_graph_id || '' }}