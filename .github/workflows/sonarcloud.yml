name: SonarCloud

on:
  push:
    branches:
      - "sonar/auto-fix-confidence-gated"
  pull_request:
    branches:
      - "master"

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Build Java classes
        if: ${{ hashFiles('pom.xml') != '' }}
        run: mvn --batch-mode --no-transfer-progress -DskipTests -Drat.skip=true compile
      - uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
